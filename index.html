<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Java Silver SE 17 — Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAFA;
    --surface: #FFFFFF;
    --surface-2: #F5F5F6;
    --surface-3: #EEEEF0;
    --border: #E6E6E7;
    --border-strong: #D0D0D1;

    --text: #414143;
    --text-2: #4E4E50;
    --text-sub: #6B6C6F;
    --text-weak: #86878A;

    --primary: #18181B;
    --primary-hover: #27272A;
    --primary-soft: #E6E6E7;
    --primary-dark: #18181B;

    --accent: #008CCF;
    --accent-hover: #016CA3;
    --accent-soft: #CEEBFA;
    --accent-softer: #F0F9FF;

    --success: #059669;
    --success-soft: #D1FAE5;
    --success-softer: #ECFDF5;
    --warning: #D97706;
    --warning-soft: #FED7AA;
    --warning-softer: #FFFBEB;
    --danger: #DC2626;
    --danger-soft: #FEE2E2;
    --danger-softer: #FEF2F2;
    --star: #F59E0B;

    /* 章カラー（7章 × ブランドパレット + 補色） */
    --c1: #008CCF;  --c1-soft: #E0F2FE;  /* 基本 — b→dashブルー */
    --c2: #7A00DF;  --c2-soft: #EDE9FE;  /* データ型 — KPIeeパープル */
    --c3: #059669;  --c3-soft: #D1FAE5;  /* 制御構造 — グリーン */
    --c4: #D97706;  --c4-soft: #FED7AA;  /* 配列・文字列 — アンバー */
    --c5: #DB2777;  --c5-soft: #FCE7F3;  /* クラス — ピンク */
    --c6: #0891B2;  --c6-soft: #CFFAFE;  /* 継承 — シアン */
    --c7: #4F46E5;  --c7-soft: #E0E7FF;  /* SE17新機能 — インディゴ */

    /* ブランドグラデーション */
    --grad-brand: linear-gradient(90deg, #008CCF, #9DA0D5, #FF7979);
    --grad-hero: linear-gradient(145deg, #0CAAEB, #36C1FA, #7CD5FD);
    --grad-blue: linear-gradient(135deg, #008CCF, #0CAAEB);

    --radius-xl: 16px;
    --radius-lg: 12px;
    --radius: 10px;
    --radius-sm: 8px;

    --shadow-xs: 0 1px 2px rgba(16, 24, 40, 0.04);
    --shadow-sm: 0 1px 3px rgba(16, 24, 40, 0.06), 0 1px 2px rgba(16, 24, 40, 0.04);
    --shadow-md: 0 4px 6px -1px rgba(16, 24, 40, 0.06), 0 2px 4px -1px rgba(16, 24, 40, 0.04);
    --shadow-lg: 0 10px 15px -3px rgba(16, 24, 40, 0.06), 0 4px 6px -2px rgba(16, 24, 40, 0.04);

    --font-heading: 'Inter', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
    --font-sans: 'Inter', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, "SF Mono", Menlo, Consolas, monospace;

    --space-1: 8px;
    --space-2: 16px;
    --space-3: 24px;
    --space-4: 40px;
    --space-5: 64px;

    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-size: 16px;
    letter-spacing: 0.005em;
    font-weight: 500;
  }
  ::selection { background: var(--primary-soft); color: var(--primary-dark); }

  /* ===== ヘッダー ===== */
  header {
    background: rgba(255, 255, 255, 0.78);
    backdrop-filter: saturate(180%) blur(14px);
    -webkit-backdrop-filter: saturate(180%) blur(14px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 20;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: var(--font-heading);
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .brand-mark {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    background: var(--primary);
    color: white;
    display: grid;
    place-items: center;
  }
  .brand-mark svg { width: 16px; height: 16px; }
  .brand-sub {
    color: var(--text-weak);
    font-weight: 400;
    margin-left: 4px;
    font-size: 13px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #chapter-indicator {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-sub);
    padding: 5px 12px;
    background: var(--surface-2);
    border-radius: 6px;
    letter-spacing: 0;
  }
  #timer-display {
    display: none;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    min-width: 56px;
    text-align: right;
    font-variant-numeric: tabular-nums;
    padding: 5px 12px;
    background: var(--accent-softer);
    border-radius: 6px;
  }
  #timer-display.active { display: inline-flex; }
  #timer-display.warning { color: var(--warning); background: var(--warning-softer); }
  #timer-display.danger { color: var(--danger); background: var(--danger-softer); animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: 0.6; } }

  /* ===== メイン ===== */
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: var(--space-5) var(--space-3) 96px;
    animation: appear 0.4s var(--ease);
  }
  @keyframes appear {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== ページタイトル ===== */
  .page-title { margin-bottom: 40px; }
  .page-title h1 {
    margin: 0 0 10px;
    font-family: var(--font-heading);
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -0.024em;
    color: var(--text);
    line-height: 1.2;
  }
  .page-title h1.hero {
    background: var(--grad-brand);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    font-size: 34px;
    font-weight: 800;
  }
  .page-title p {
    margin: 0;
    font-size: 15px;
    font-weight: 400;
    color: var(--text-sub);
    letter-spacing: 0;
    line-height: 1.6;
  }

  /* ===== セクション ===== */
  section { margin-bottom: var(--space-4); }
  .section-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-sub);
    letter-spacing: 0;
    margin: 0 0 12px;
  }

  /* ===== カード ===== */
  .card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    overflow: hidden;
  }

  /* ===== 統計 ===== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .stat {
    padding: 20px 18px;
    border-right: 1px solid var(--border);
    transition: background 0.2s var(--ease);
  }
  .stat:hover { background: var(--surface-2); }
  .stat:last-child { border-right: none; }
  .stat .label {
    font-size: 12px;
    color: var(--text-sub);
    font-weight: 500;
    letter-spacing: 0;
    margin-bottom: 8px;
  }
  .stat .value {
    font-family: var(--font-heading);
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
  }
  .stat .value.accent { color: var(--accent); }
  .stat .value.gradient {
    background: var(--grad-brand);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .stat .value.star { color: var(--star); }
  .stat .value.danger { color: var(--danger); }
  .stat .unit {
    font-size: 13px;
    color: var(--text-sub);
    font-weight: 500;
    margin-left: 2px;
  }

  /* ===== 問題数選択 ===== */
  .count-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .count-btn {
    cursor: pointer;
    padding: 24px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    text-align: center;
    transition: all 0.15s var(--ease);
    font-family: inherit;
    color: var(--text);
    text-transform: none;
    letter-spacing: 0;
  }
  .count-btn:hover {
    border-color: var(--text);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }
  .count-btn:active { transform: translateY(0); }

  .count-btn .count-num {
    font-family: var(--font-heading);
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1;
    display: inline-block;
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }
  .count-btn .count-unit {
    font-size: 14px;
    font-weight: 500;
    margin-left: 3px;
    color: var(--text-sub);
  }
  .count-btn .count-desc {
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-sub);
    font-weight: 500;
    letter-spacing: 0;
  }

  /* ===== 章ピル ===== */
  .pill-group {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .pill {
    padding: 7px 14px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-2);
    cursor: pointer;
    transition: all 0.15s var(--ease);
    font-family: inherit;
    letter-spacing: 0;
    text-transform: none;
  }
  .pill:hover { border-color: var(--text); color: var(--text); }
  .pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    font-weight: 600;
    box-shadow: 0 2px 6px -2px rgba(0, 140, 207, 0.45);
  }

  /* ===== ボタン ===== */
  button {
    border: 1px solid var(--accent);
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s var(--ease);
    background: var(--accent);
    color: white;
    font-family: inherit;
    letter-spacing: 0;
    line-height: 1.4;
    text-transform: none;
    box-shadow: 0 2px 6px -2px rgba(0, 140, 207, 0.4);
  }
  button:hover:not(:disabled) {
    background: var(--accent-hover);
    border-color: var(--accent-hover);
    box-shadow: 0 4px 10px -2px rgba(0, 140, 207, 0.5);
    transform: translateY(-1px);
  }
  button:active:not(:disabled) { transform: translateY(1px); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }
  button.secondary:hover:not(:disabled) {
    border-color: var(--text);
    background: var(--surface);
  }
  button.ghost {
    background: transparent;
    color: var(--text-sub);
    border: 1px solid transparent;
    padding: 8px 12px;
    text-transform: none;
    letter-spacing: 0;
  }
  button.ghost:hover:not(:disabled) {
    background: var(--surface-2);
    color: var(--text);
  }
  button.large {
    padding: 14px 24px;
    font-size: 15px;
  }
  .btn-group {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  /* ===== 問題画面 ===== */
  .question-card {
    padding: 40px;
  }
  @media (max-width: 540px) { .question-card { padding: 24px; } }

  .question-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .q-number {
    font-size: 12px;
    color: var(--text-sub);
    font-weight: 500;
    letter-spacing: 0;
    font-variant-numeric: tabular-nums;
    text-transform: none;
  }
  .progress-bar {
    height: 4px;
    background: var(--surface-2);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 32px;
  }
  .progress-fill {
    height: 100%;
    background: var(--grad-brand);
    transition: width 0.5s var(--ease);
    border-radius: 999px;
  }
  .question-text {
    font-size: 16px;
    line-height: 1.85;
    margin-bottom: 28px;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text);
    font-weight: 500;
    letter-spacing: 0.005em;
  }
  .question-text p { margin: 0 0 12px; }
  pre.code-block {
    font-family: var(--font-mono);
    font-size: 13px;
    background: #FAFAFA;
    color: var(--text);
    padding: 18px 20px;
    border-radius: var(--radius);
    overflow-x: auto;
    margin: 16px 0;
    line-height: 1.7;
    letter-spacing: 0;
    border: 1px solid var(--border);
    font-weight: 400;
  }

  /* ===== 選択肢 ===== */
  .choices {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 8px;
  }
  .choice {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 18px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s var(--ease);
    background: var(--surface);
  }
  .choice:hover:not(.disabled) { border-color: var(--text); }
  .choice.selected {
    border-color: var(--accent);
    background: var(--accent-softer);
  }
  .choice.correct {
    border-color: var(--success);
    background: var(--success-softer);
  }
  .choice.incorrect {
    border-color: var(--danger);
    background: var(--danger-softer);
  }
  .choice.disabled { cursor: default; }
  .choice-label {
    display: grid;
    place-items: center;
    width: 26px;
    height: 26px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-weight: 600;
    color: var(--text-sub);
    font-size: 12px;
    flex-shrink: 0;
    margin-top: 2px;
    transition: all 0.15s var(--ease);
  }
  .choice:hover:not(.disabled) .choice-label { border-color: var(--text); color: var(--text); }
  .choice.selected .choice-label {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .choice.correct .choice-label {
    background: var(--success);
    border-color: var(--success);
    color: white;
  }
  .choice.incorrect .choice-label {
    background: var(--danger);
    border-color: var(--danger);
    color: white;
  }
  .choice-text {
    flex: 1;
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 15px;
    color: var(--text);
    letter-spacing: 0.005em;
    line-height: 1.65;
    padding-top: 1px;
    font-weight: 400;
  }

  /* ===== 解説 ===== */
  .explanation {
    margin-top: 24px;
    padding: 24px;
    background: var(--surface-2);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    animation: fadeIn 0.3s var(--ease);
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .explanation.correct {
    background: var(--success-softer);
    border-color: var(--success-soft);
  }
  .explanation.incorrect {
    background: var(--danger-softer);
    border-color: var(--danger-soft);
  }
  .result-judge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 16px;
    letter-spacing: 0;
  }
  .result-judge .badge-icon {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    color: white;
    font-size: 10px;
    font-weight: 700;
    line-height: 1;
  }
  .result-judge.correct { color: var(--success); }
  .result-judge.correct .badge-icon { background: var(--success); }
  .result-judge.incorrect { color: var(--danger); }
  .result-judge.incorrect .badge-icon { background: var(--danger); }
  .exp-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-sub);
    letter-spacing: 0;
    margin: 18px 0 8px;
  }
  .exp-label:first-of-type { margin-top: 0; }
  .exp-text {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    letter-spacing: 0.005em;
    font-weight: 400;
  }
  .detail-toggle {
    margin-top: 16px;
    font-size: 13px;
    color: var(--accent);
    cursor: pointer;
    user-select: none;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 0;
    transition: color 0.15s;
  }
  .detail-toggle:hover { color: var(--accent-hover); }
  .detail-content {
    margin-top: 10px;
    padding: 16px 18px;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    display: none;
    font-size: 13px;
    color: var(--text-2);
    line-height: 1.85;
    letter-spacing: 0.005em;
  }
  .detail-content.show {
    display: block;
    animation: fadeIn 0.2s var(--ease);
  }

  /* ===== 星ボタン ===== */
  .star-btn {
    background: transparent;
    border: none;
    padding: 6px;
    cursor: pointer;
    color: var(--text-weak);
    transition: all 0.15s var(--ease);
    line-height: 0;
    box-shadow: none;
    border-radius: var(--radius);
  }
  .star-btn:hover {
    color: var(--accent);
    background: var(--accent-soft);
    box-shadow: none;
    transform: scale(1.08);
  }
  .star-btn.active { color: var(--accent); }
  .star-btn.active:hover { background: var(--accent-soft); }
  .star-btn svg { width: 20px; height: 20px; }

  /* ===== 結果画面 ===== */
  .score-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 48px 32px;
    text-align: center;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }
  .score-card > * { position: relative; }

  /* 円形プログレス */
  .score-ring-wrap {
    position: relative;
    width: 160px;
    height: 160px;
    margin: 0 auto 20px;
  }
  .score-ring {
    transform: rotate(-90deg);
    width: 100%;
    height: 100%;
  }
  .score-ring-bg {
    fill: none;
    stroke: var(--surface-2);
    stroke-width: 8;
  }
  .score-ring-fg {
    fill: none;
    stroke: var(--text);
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dasharray 0.9s var(--ease);
  }
  .score-card.high .score-ring-fg { stroke: var(--success); }
  .score-card.mid .score-ring-fg { stroke: var(--warning); }
  .score-card.low .score-ring-fg { stroke: var(--danger); }
  .score-ring-text {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
  }
  .score-value {
    font-family: var(--font-heading);
    font-size: 44px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.03em;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .score-value .unit {
    font-size: 18px;
    color: var(--text-sub);
    font-weight: 500;
    margin-left: 2px;
  }
  .score-label {
    font-size: 12px;
    color: var(--text-sub);
    font-weight: 500;
    letter-spacing: 0;
    margin-bottom: 8px;
  }
  .score-detail {
    margin-top: 4px;
    font-size: 14px;
    color: var(--text-2);
    letter-spacing: 0;
    font-weight: 400;
  }

  /* ===== 章別結果 ===== */
  .chapter-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 22px;
    border-bottom: 1px solid var(--border);
    gap: 18px;
    transition: background 0.15s;
  }
  .chapter-row:hover { background: var(--surface-2); }
  .chapter-row:last-child { border-bottom: none; }
  .chapter-name {
    font-weight: 500;
    color: var(--text);
    font-size: 13px;
    letter-spacing: -0.005em;
  }
  .chapter-right {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .chapter-bar {
    width: 120px;
    height: 5px;
    background: var(--border);

<header>
  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3.5A1 1 0 0 1 4 2.5h13v15H4a1 1 0 0 1-1-1v-13z"/><path d="M3 16.5A1 1 0 0 1 4 15.5h13"/></svg>
    </div>
    <span>Java Silver<span class="brand-sub">SE 17</span></span>
  </div>
  <div class="header-right">
    <span id="chapter-indicator">ホーム</span>
    <span id="timer-display"></span>
  </div>
</header>

<main id="app"></main>

<script src="questions.js"></script>
<script src="lessons.js"></script>
<script>
(() => {
  'use strict';

  const CHAPTER_NAMES = {
    1: '第1章 Javaの基本',
    2: '第2章 データ型と変数',
    3: '第3章 制御構造',
    4: '第4章 配列・文字列・コレクション',
    5: '第5章 クラスとメソッド',
    6: '第6章 継承・ポリモーフィズム・例外・ラムダ',
    7: '第7章 Java SE 17 新機能'
  };
  const CHAPTER_SHORT = {
    1: '基本', 2: 'データ型', 3: '制御構造', 4: '配列・文字列',
    5: 'クラス', 6: '継承・例外', 7: 'SE17新機能'
  };

  const TIMER_SECONDS = 90;
  const STORAGE_KEY = 'java-silver-state-v1';

  const state = loadState();
  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (_) {}
    return {
      starred: [], lastIncorrect: [],
      totalAnswered: 0, totalCorrect: 0,
      timerEnabled: true, selectedChapter: 'all',
      learnedTopics: [], lastTopic: null
    };
  }
  // 互換性: 既存stateへの追加フィールド補完
  if (!Array.isArray(state?.learnedTopics)) state.learnedTopics = [];
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function markTopicLearned(id) {
    if (!state.learnedTopics.includes(id)) {
      state.learnedTopics.push(id);
    }
    state.lastTopic = id;
    saveState();
  }

  function chapterProgress(ch) {
    const total = LESSONS.filter(l => l.chapter === ch).length;
    const done = LESSONS.filter(l => l.chapter === ch && state.learnedTopics.includes(l.id)).length;
    return { done, total, pct: total ? Math.round((done / total) * 100) : 0 };
  }

  let session = null;
  let timerId = null;

  const app = document.getElementById('app');
  const chapterIndicator = document.getElementById('chapter-indicator');
  const timerDisplay = document.getElementById('timer-display');

  function setChapterIndicator(text) {
    chapterIndicator.textContent = text || 'ホーム';
  }
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function formatQuestion(text) {
    const lines = text.split('\n');
    const buf = [];
    let codeBuf = [];
    const flushCode = () => {
      if (codeBuf.length) {
        buf.push(`<pre class="code-block">${escapeHtml(codeBuf.join('\n'))}</pre>`);
        codeBuf = [];
      }
    };
    for (const line of lines) {
      const isCodeLine = /[{}();]|^\s{2,}|\bpublic\b|\bprivate\b|\bclass\b|\bstatic\b|\bvoid\b|\bint\b|System\.out|\bfor\b|\bwhile\b|\bif\b|\belse\b|\breturn\b|\bnew\b|\btry\b|\bcatch\b|\bfinally\b|\bthrow\b/.test(line);
      if (isCodeLine) codeBuf.push(line);
      else {
        flushCode();
        if (line.trim()) buf.push(`<p>${escapeHtml(line)}</p>`);
      }
    }
    flushCode();
    return buf.join('');
  }
  function render(html) {
    app.innerHTML = html;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  function stopTimer() {
    if (timerId) { clearInterval(timerId); timerId = null; }
    timerDisplay.classList.remove('active', 'warning', 'danger');
  }
  function startTimer(onTimeout) {
    stopTimer();
    if (!state.timerEnabled) return;
    let remaining = TIMER_SECONDS;
    timerDisplay.classList.add('active');
    timerDisplay.textContent = `${remaining}s`;
    timerId = setInterval(() => {
      remaining--;
      timerDisplay.textContent = `${remaining}s`;
      timerDisplay.classList.remove('warning', 'danger');
      if (remaining <= 10) timerDisplay.classList.add('danger');
      else if (remaining <= 30) timerDisplay.classList.add('warning');
      if (remaining <= 0) { stopTimer(); onTimeout(); }
    }, 1000);
  }

  const ICON_STAR = `<svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M12 2l2.9 6.6 7.1.7-5.4 4.9 1.6 7-6.2-3.7-6.2 3.7 1.6-7L2 9.3l7.1-.7L12 2z"/></svg>`;
  const ICON_STAR_OUTLINE = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><path d="M12 2l2.9 6.6 7.1.7-5.4 4.9 1.6 7-6.2-3.7-6.2 3.7 1.6-7L2 9.3l7.1-.7L12 2z"/></svg>`;

  function renderHome() {
    stopTimer();
    setChapterIndicator('ホーム');
    const accuracy = state.totalAnswered > 0
      ? Math.round((state.totalCorrect / state.totalAnswered) * 100) : 0;
    const starredCount = state.starred.length;
    const lastIncorrectCount = state.lastIncorrect.length;

    const chapterPills = [
      { v: 'all', label: '全章' },
      ...Object.keys(CHAPTER_SHORT).map(k => ({ v: k, label: `${k}章 · ${CHAPTER_SHORT[k]}` }))
    ].map(opt => `
      <button class="pill ${state.selectedChapter === opt.v ? 'active' : ''}" data-chapter="${opt.v}">${opt.label}</button>
    `).join('');

    render(`
      <div class="page-title">
        <h1 class="hero">Java Silverを学ぶ</h1>
        <p>Java Silver SE 17（1Z0-825）対策 · 教科書40トピック + 練習問題175問</p>
      </div>

      <section>
        <div class="section-label">学習モード</div>
        <div class="mode-grid">
          <button class="mode-card learn" id="btn-learn">
            <svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4.5A1.5 1.5 0 0 1 5.5 3H20v18H5.5A1.5 1.5 0 0 1 4 19.5v-15z"/><path d="M4 19.5A1.5 1.5 0 0 1 5.5 18H20"/></svg>
            <div class="mode-title">教科書で学ぶ</div>
            <div class="mode-desc">基礎知識を章ごとに · 全40トピック</div>
          </button>
          <button class="mode-card quiz" id="btn-quiz-mode">
            <svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            <div class="mode-title">問題を解く</div>
            <div class="mode-desc">175問から選んで実戦練習</div>
          </button>
        </div>
      </section>

      <section>
        <div class="stats-grid">
          <div class="stat">
            <div class="label">累計正答率</div>
            <div class="value gradient">${accuracy}<span class="unit">%</span></div>
          </div>
          <div class="stat">
            <div class="label">累計回答</div>
            <div class="value">${state.totalAnswered}</div>
          </div>
          <div class="stat">
            <div class="label">苦手マーク</div>
            <div class="value star">${starredCount}</div>
          </div>
          <div class="stat">
            <div class="label">直近の誤答</div>
            <div class="value danger">${lastIncorrectCount}</div>
          </div>
        </div>
      </section>

      <section>
        <div class="section-label">出題範囲</div>
        <div class="pill-group" id="chapter-pills">${chapterPills}</div>
      </section>

      <section>
        <div class="section-label">問題数を選択</div>
        <div class="count-grid">
          <button class="count-btn" data-count="5">
            <span class="count-num">5</span><span class="count-unit">問</span>
            <div class="count-desc">サクッと確認</div>
          </button>
          <button class="count-btn" data-count="10">
            <span class="count-num">10</span><span class="count-unit">問</span>
            <div class="count-desc">標準</div>
          </button>
          <button class="count-btn" data-count="20">
            <span class="count-num">20</span><span class="count-unit">問</span>
            <div class="count-desc">じっくり</div>
          </button>
        </div>
      </section>

      <section>
        <div class="section-label">復習モード</div>
        <div class="btn-group">
          <button class="secondary" id="btn-review" ${lastIncorrectCount === 0 ? 'disabled' : ''}>直近のミスを復習 · ${lastIncorrectCount}問</button>
          <button class="secondary" id="btn-starred" ${starredCount === 0 ? 'disabled' : ''}>苦手マークのみ · ${starredCount}問</button>
        </div>
      </section>

      <section>
        <div class="section-label">設定</div>
        <div class="card">
          <div class="list-item">
            <div>
              <div class="list-label">制限時間</div>
              <div class="list-hint">1問あたり90秒（本試験の約1.7分ペース）</div>
            </div>
            <div class="switch ${state.timerEnabled ? 'on' : ''}" id="switch-timer"></div>
          </div>
          <div class="list-item">
            <div>
              <div class="list-label">進捗データ</div>
              <div class="list-hint">累計・苦手マーク・誤答履歴をリセット</div>
            </div>
            <button class="ghost" id="btn-reset">リセット</button>
          </div>
        </div>
      </section>
    `);

    document.getElementById('btn-learn').addEventListener('click', renderLearnHome);
    document.getElementById('btn-quiz-mode').addEventListener('click', () => {
      const target = document.querySelector('.count-grid');
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
    app.querySelectorAll('#chapter-pills .pill').forEach(btn => {
      btn.addEventListener('click', () => {
        state.selectedChapter = btn.dataset.chapter;
        saveState();
        renderHome();
      });
    });
    app.querySelectorAll('[data-count]').forEach(btn => {
      btn.addEventListener('click', () => {
        const count = parseInt(btn.dataset.count, 10);
        startQuiz({ count, chapter: state.selectedChapter, mode: 'normal' });
      });
    });
    document.getElementById('btn-review').addEventListener('click', () => startQuiz({ mode: 'review' }));
    document.getElementById('btn-starred').addEventListener('click', () => startQuiz({ mode: 'starred' }));
    document.getElementById('switch-timer').addEventListener('click', () => {
      state.timerEnabled = !state.timerEnabled;
      saveState();
      renderHome();
    });
    document.getElementById('btn-reset').addEventListener('click', () => {
      if (confirm('進捗データ（累計・苦手マーク・誤答履歴）をリセットしますか？')) {
        localStorage.removeItem(STORAGE_KEY);
        Object.assign(state, {
          starred: [], lastIncorrect: [],
          totalAnswered: 0, totalCorrect: 0, timerEnabled: true,
          selectedChapter: 'all'
        });
        renderHome();
      }
    });
  }

  function renderLessonBody(text) {
    return escapeHtml(text).replace(/\n/g, '<br>');
  }

  function renderLearnHome() {
    stopTimer();
    setChapterIndicator('教科書');
    const chapterCards = Object.keys(CHAPTER_NAMES).map(ch => {
      const p = chapterProgress(parseInt(ch, 10));
      const isDone = p.done === p.total && p.total > 0;
      return `
        <button class="chapter-card ${isDone ? 'done' : ''}" data-ch="${ch}">
          <div class="chip">${ch}</div>
          <div class="body">
            <div class="title">${escapeHtml(CHAPTER_NAMES[ch])}</div>
            <div class="meta">
              <span>${p.done} / ${p.total}</span>
              <div class="mini-bar"><div class="mini-bar-fill" style="width:${p.pct}%;"></div></div>
            </div>
          </div>
          <div class="arrow">›</div>
        </button>
      `;
    }).join('');

    render(`
      <div class="breadcrumb">
        <a id="crumb-home">ホーム</a>
        <span class="sep">›</span>
        <span>教科書</span>
      </div>
      <div class="page-title">
        <h1>教科書で学ぶ</h1>
        <p>章を選んで基礎から学ぶ · 問題を解く前の土台づくりに</p>
      </div>
      <section>
        <div class="section-label">章を選択</div>
        <div class="chapter-card-list">${chapterCards}</div>
      </section>
    `);

    document.getElementById('crumb-home').addEventListener('click', renderHome);
    app.querySelectorAll('.chapter-card').forEach(btn => {
      btn.addEventListener('click', () => {
        renderChapterLessons(parseInt(btn.dataset.ch, 10));
      });
    });
  }

  function renderChapterLessons(chapter) {
    stopTimer();
    setChapterIndicator(CHAPTER_NAMES[chapter]);
    const topics = LESSONS.filter(l => l.chapter === chapter);
    const topicHtml = topics.map((t, i) => {
      const done = state.learnedTopics.includes(t.id);
      return `
      <button class="topic-card ${done ? 'done' : ''}" data-id="${t.id}" data-ch="${chapter}">
        <div class="num">${done ? '✓' : (i + 1)}</div>
        <div class="body">
          <div class="title">${escapeHtml(t.title)}</div>
          <div class="summary">${escapeHtml(t.summary)}</div>
        </div>
      </button>
    `;
    }).join('');

    render(`
      <div class="breadcrumb">
        <a id="crumb-home">ホーム</a>
        <span class="sep">›</span>
        <a id="crumb-learn">教科書</a>
        <span class="sep">›</span>
        <span>${escapeHtml(CHAPTER_SHORT[chapter])}</span>
      </div>
      <div class="page-title">
        <h1>${escapeHtml(CHAPTER_NAMES[chapter])}</h1>
        <p>${topics.length} トピックを順番に学んでいきましょう</p>
      </div>
      <section>
        <div class="section-label">トピック一覧</div>
        <div class="topic-list">${topicHtml}</div>
      </section>
      <div class="btn-group" style="margin-top:28px;">
        <button class="secondary" id="btn-back-learn">← 章一覧へ</button>
        <button id="btn-quiz-ch">この章の問題を解く →</button>
      </div>
    `);

    document.getElementById('crumb-home').addEventListener('click', renderHome);
    document.getElementById('crumb-learn').addEventListener('click', renderLearnHome);
    document.getElementById('btn-back-learn').addEventListener('click', renderLearnHome);
    document.getElementById('btn-quiz-ch').addEventListener('click', () => {
      startQuiz({ count: 10, chapter: String(chapter), mode: 'normal' });
    });
    app.querySelectorAll('.topic-card').forEach(btn => {
      btn.addEventListener('click', () => {
        renderLesson(btn.dataset.id);
      });
    });
  }

  function renderLesson(topicId) {
    stopTimer();
    const topic = LESSONS.find(l => l.id === topicId);
    if (!topic) { renderLearnHome(); return; }
    setChapterIndicator(CHAPTER_NAMES[topic.chapter]);

    const idx = LESSONS.filter(l => l.chapter === topic.chapter).findIndex(l => l.id === topicId);
    const chapterTopics = LESSONS.filter(l => l.chapter === topic.chapter);
    const prev = idx > 0 ? chapterTopics[idx - 1] : null;
    const next = idx < chapterTopics.length - 1 ? chapterTopics[idx + 1] : null;

    const sectionsHtml = topic.sections.map(s => `
      <div class="lesson-section">
        <h2>${escapeHtml(s.heading)}</h2>
        <p>${renderLessonBody(s.body)}</p>
        ${s.code ? `<pre class="code-block">${escapeHtml(s.code)}</pre>` : ''}
      </div>
    `).join('');

    const pointsHtml = topic.points && topic.points.length ? `
      <div class="points-box">
        <h3>要点</h3>
        <ul>${topic.points.map(p => `<li>${escapeHtml(p)}</li>`).join('')}</ul>
      </div>
    ` : '';

    const pitfallsHtml = topic.pitfalls && topic.pitfalls.length ? `
      <div class="pitfalls-box">
        <h3>ひっかかりやすいポイント</h3>
        <ul>${topic.pitfalls.map(p => `<li>${escapeHtml(p)}</li>`).join('')}</ul>
      </div>
    ` : '';

    render(`
      <div class="breadcrumb">
        <a id="crumb-home">ホーム</a>
        <span class="sep">›</span>
        <a id="crumb-learn">教科書</a>
        <span class="sep">›</span>
        <a id="crumb-ch">${escapeHtml(CHAPTER_SHORT[topic.chapter])}</a>
        <span class="sep">›</span>
        <span>${idx + 1} / ${chapterTopics.length}</span>
      </div>

      <div class="lesson-header">
        <h1>${escapeHtml(topic.title)}</h1>
      </div>
      <div class="lesson-summary">${escapeHtml(topic.summary)}</div>

      ${sectionsHtml}
      ${pointsHtml}
      ${pitfallsHtml}

      <div class="lesson-nav">
        <div class="group">
          ${prev ? `<button class="secondary" id="btn-prev">← 前</button>` : '<span></span>'}
        </div>
        <div class="group">
          <button class="secondary" id="btn-ch-list">章の目次へ</button>
          ${next
            ? `<button id="btn-next-lesson">次のトピック →</button>`
            : `<button id="btn-to-quiz">この章の問題を解く →</button>`}
        </div>
      </div>
    `);

    markTopicLearned(topic.id);

    document.getElementById('crumb-home').addEventListener('click', renderHome);
    document.getElementById('crumb-learn').addEventListener('click', renderLearnHome);
    document.getElementById('crumb-ch').addEventListener('click', () => renderChapterLessons(topic.chapter));
    document.getElementById('btn-ch-list').addEventListener('click', () => renderChapterLessons(topic.chapter));
    if (prev) {
      document.getElementById('btn-prev').addEventListener('click', () => renderLesson(prev.id));
    }
    if (next) {
      document.getElementById('btn-next-lesson').addEventListener('click', () => renderLesson(next.id));
    } else {
      document.getElementById('btn-to-quiz').addEventListener('click', () => {
        startQuiz({ count: 10, chapter: String(topic.chapter), mode: 'normal' });
      });
    }
  }

  function startQuiz({ count, chapter, mode }) {
    let pool;
    if (mode === 'review') pool = QUESTIONS.filter(q => state.lastIncorrect.includes(q.id));
    else if (mode === 'starred') pool = QUESTIONS.filter(q => state.starred.includes(q.id));
    else {
      if (chapter === 'all') pool = QUESTIONS.slice();
      else {
        const c = parseInt(chapter, 10);
        pool = QUESTIONS.filter(q => q.chapter === c);
      }
    }
    if (pool.length === 0) { alert('出題可能な問題がありません。'); return; }

    const picked = shuffle(pool).slice(0, count || pool.length);
    const questions = picked.map(q => {
      const idxs = shuffle(q.choices.map((_, i) => i));
      const shuffledChoices = idxs.map(i => q.choices[i]);
      const newAnswer = idxs.indexOf(q.answer);
      return { ...q, choices: shuffledChoices, answer: newAnswer };
    });

    session = { questions, index: 0, answers: [], newlyIncorrect: [] };
    renderQuestion();
  }

  function renderQuestion() {
    const q = session.questions[session.index];
    const isStarred = state.starred.includes(q.id);
    setChapterIndicator(CHAPTER_NAMES[q.chapter]);

    render(`
      <div class="card question-card">
        <div class="question-meta">
          <span class="q-number">Q ${String(session.index + 1).padStart(2, '0')} / ${String(session.questions.length).padStart(2, '0')}</span>
          <button class="star-btn ${isStarred ? 'active' : ''}" id="btn-star" title="苦手マーク">
            ${isStarred ? ICON_STAR : ICON_STAR_OUTLINE}
          </button>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${((session.index) / session.questions.length) * 100}%;"></div>
        </div>
        <div class="question-text">${formatQuestion(q.question)}</div>
        <div class="choices" id="choices">
          ${q.choices.map((c, i) => `
            <div class="choice" data-index="${i}">
              <span class="choice-label">${String.fromCharCode(65 + i)}</span>
              <span class="choice-text">${escapeHtml(c)}</span>
            </div>
          `).join('')}
        </div>
        <div id="explanation-area"></div>
        <div class="btn-group" id="bottom-btn" style="justify-content:flex-end; margin-top:20px;">
          <button class="ghost" id="btn-quit">中断</button>
        </div>
      </div>
    `);

    document.getElementById('btn-star').addEventListener('click', () => {
      toggleStar(q.id);
      renderQuestion();
    });
    document.getElementById('btn-quit').addEventListener('click', () => {
      if (confirm('セッションを中断してホームへ戻りますか？（ここまでの回答は記録されません）')) {
        session = null;
        renderHome();
      }
    });
    document.querySelectorAll('#choices .choice').forEach(el => {
      el.addEventListener('click', () => selectAnswer(parseInt(el.dataset.index, 10)));
    });
    startTimer(() => selectAnswer(-1));
  }

  function toggleStar(id) {
    const i = state.starred.indexOf(id);
    if (i >= 0) state.starred.splice(i, 1);
    else state.starred.push(id);
    saveState();
  }

  function selectAnswer(chosen) {
    stopTimer();
    const q = session.questions[session.index];
    const correct = chosen === q.answer;
    session.answers.push({ id: q.id, chapter: q.chapter, chosen, correct });
    if (!correct) session.newlyIncorrect.push(q.id);

    state.totalAnswered++;
    if (correct) state.totalCorrect++;
    saveState();

    document.querySelectorAll('#choices .choice').forEach(el => {
      el.classList.add('disabled');
      el.replaceWith(el.cloneNode(true));
    });
    const choiceEls = document.querySelectorAll('#choices .choice');
    choiceEls.forEach(el => {
      const i = parseInt(el.dataset.index, 10);
      if (i === q.answer) el.classList.add('correct');
      if (i === chosen && !correct) el.classList.add('incorrect');
    });

    const judgeLabel = chosen === -1 ? '時間切れ' : correct ? '正解' : '不正解';
    const judgeIcon = correct ? '✓' : '✕';
    const judgeText = `
      <div class="result-judge ${correct ? 'correct' : 'incorrect'}">
        <span class="badge-icon">${judgeIcon}</span>
        <span>${judgeLabel}</span>
      </div>
    `;

    const expArea = document.getElementById('explanation-area');
    expArea.innerHTML = `
      <div class="explanation ${correct ? 'correct' : 'incorrect'}">
        ${judgeText}
        <div class="exp-label">ざっくり解説</div>
        <div class="exp-text">${escapeHtml(q.brief)}</div>
        <div class="detail-toggle" id="detail-toggle">▾ 詳しく解説を見る</div>
        <div class="detail-content" id="detail-content">${escapeHtml(q.detail)}</div>
      </div>
    `;
    document.getElementById('detail-toggle').addEventListener('click', () => {
      const dc = document.getElementById('detail-content');
      const dt = document.getElementById('detail-toggle');
      dc.classList.toggle('show');
      dt.textContent = dc.classList.contains('show') ? '▴ 閉じる' : '▾ 詳しく解説を見る';
    });

    const bottomBtn = document.getElementById('bottom-btn');
    const isLast = session.index === session.questions.length - 1;
    bottomBtn.innerHTML = `
      <button class="ghost" id="btn-quit-2">中断</button>
      <button id="btn-next" class="large">${isLast ? '結果を見る →' : '次の問題 →'}</button>
    `;
    document.getElementById('btn-quit-2').addEventListener('click', () => {
      if (confirm('セッションを中断してホームへ戻りますか？')) {
        session = null;
        renderHome();
      }
    });
    document.getElementById('btn-next').addEventListener('click', () => {
      if (isLast) renderResult();
      else { session.index++; renderQuestion(); }
    });
  }

  function renderResult() {
    stopTimer();
    setChapterIndicator('結果');
    state.lastIncorrect = session.newlyIncorrect.slice();
    saveState();

    const total = session.answers.length;
    const correct = session.answers.filter(a => a.correct).length;
    const rate = Math.round((correct / total) * 100);

    const byChapter = {};
    session.answers.forEach(a => {
      if (!byChapter[a.chapter]) byChapter[a.chapter] = { total: 0, correct: 0 };
      byChapter[a.chapter].total++;
      if (a.correct) byChapter[a.chapter].correct++;
    });

    const chapterHtml = Object.keys(byChapter)
      .sort((a, b) => parseInt(a) - parseInt(b))
      .map(c => {
        const { total: t, correct: cc } = byChapter[c];
        const r = Math.round((cc / t) * 100);
        const cls = r >= 80 ? 'high' : r >= 50 ? 'mid' : 'low';
        return `
          <div class="chapter-row">
            <span class="chapter-name">${CHAPTER_NAMES[c]}</span>
            <div class="chapter-right">
              <div class="chapter-bar"><div class="chapter-bar-fill ${cls}" style="width:${r}%;"></div></div>
              <span class="rate ${cls}">${cc}/${t} · ${r}%</span>
            </div>
          </div>
        `;
      }).join('');

    const heroCls = rate >= 80 ? 'high' : rate >= 50 ? 'mid' : 'low';
    const comment = rate >= 80
      ? 'すばらしい正答率です。本番でもこの調子で。'
      : rate >= 50
        ? '間違えた問題を復習モードで固めましょう。'
        : '基礎から復習して再チャレンジしましょう。';

    // 円形プログレス用
    const RADIUS = 82;
    const CIRC = 2 * Math.PI * RADIUS;
    const offset = CIRC * (1 - rate / 100);

    render(`
      <div class="page-title">
        <h1>結果</h1>
        <p>${comment}</p>
      </div>

      <div class="score-card ${heroCls}">
        <div class="score-label">正答率</div>
        <div class="score-ring-wrap">
          <svg class="score-ring" viewBox="0 0 180 180">
            <circle class="score-ring-bg" cx="90" cy="90" r="${RADIUS}"></circle>
            <circle class="score-ring-fg" cx="90" cy="90" r="${RADIUS}"
                    stroke-dasharray="${CIRC}"
                    stroke-dashoffset="${offset}"></circle>
          </svg>
          <div class="score-ring-text">
            <div class="score-value">${rate}<span class="unit">%</span></div>
          </div>
        </div>
        <div class="score-detail">${correct} / ${total} 問正解</div>
      </div>

      <section>
        <div class="section-label">章別の正答率</div>
        <div class="card">${chapterHtml}</div>
      </section>

      <div class="btn-group" style="margin-top:28px;">
        <button id="btn-home" class="large">ホームへ戻る</button>
        ${session.newlyIncorrect.length > 0
          ? '<button class="secondary large" id="btn-retry-wrong">間違えた問題だけ再挑戦</button>'
          : ''}
      </div>
    `);

    document.getElementById('btn-home').addEventListener('click', renderHome);
    const retryBtn = document.getElementById('btn-retry-wrong');
    if (retryBtn) retryBtn.addEventListener('click', () => startQuiz({ mode: 'review' }));
  }

  renderHome();
})();
</script>
</body>
</html>
