<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Java Silver SE 17 — Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFFFFF;
    --surface: #FFFFFF;
    --surface-2: #F7F7F7;
    --border: #E5E5E5;
    --border-strong: #C7C7C7;

    --text: #3C3C3C;
    --text-2: #4B4B4B;
    --text-sub: #777777;
    --text-weak: #AFAFAF;

    --primary: #58CC02;
    --primary-hover: #4BAC00;
    --primary-dark: #4BAC00;
    --primary-darker: #3D8E00;
    --primary-light: #89E219;
    --primary-soft: #D7FFB8;
    --primary-softer: #F0FFE0;

    --purple: #CE82FF;
    --purple-dark: #A560E0;
    --purple-soft: #F2E4FF;

    --orange: #FF9600;
    --orange-dark: #E08600;
    --orange-soft: #FFE8C8;

    --pink: #FF4B4B;
    --pink-dark: #E04040;
    --pink-soft: #FFD9D9;

    --blue: #1CB0F6;
    --blue-dark: #0095D6;
    --blue-soft: #C8EEFF;

    --yellow: #FFC800;
    --yellow-dark: #E0AF00;
    --yellow-soft: #FFF3C0;

    --accent: #FFC800;
    --accent-soft: #FFF3C0;

    --success: #58CC02;
    --success-bg: #F0FFE0;
    --success-border: #89E219;
    --danger: #FF4B4B;
    --danger-bg: #FFE5E5;
    --danger-border: #FFB8B8;
    --warning: #FF9600;
    --warning-bg: #FFE8C8;
    --warning-border: #FFCD85;
    --star: #FFC800;

    --radius-xl: 16px;
    --radius-lg: 14px;
    --radius: 12px;
    --radius-sm: 10px;

    --btn-shadow: 0 4px 0;
    --shadow-xs: 0 2px 0 rgba(0, 0, 0, 0.04);
    --shadow-sm: 0 2px 0 var(--border);
    --shadow-md: 0 4px 0 var(--border);
    --shadow-lg: 0 6px 0 rgba(0, 0, 0, 0.08);
    --shadow-primary: 0 4px 0 var(--primary-dark);

    --font-heading: 'Nunito', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
    --font-sans: 'Nunito', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
    --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;

    --space-1: 8px;
    --space-2: 16px;
    --space-3: 24px;
    --space-4: 36px;
    --space-5: 56px;

    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-size: 15px;
    letter-spacing: 0;
    font-weight: 700;
  }
  ::selection { background: var(--primary-soft); color: var(--primary-dark); }

  /* ===== ヘッダー ===== */
  header {
    background: rgba(255, 255, 255, 0.78);
    backdrop-filter: saturate(180%) blur(14px);
    -webkit-backdrop-filter: saturate(180%) blur(14px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 20;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: var(--font-heading);
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .brand-mark {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    background: var(--primary);
    border: 2px solid var(--primary-dark);
    color: white;
    display: grid;
    place-items: center;
    font-family: var(--font-heading);
    font-weight: 900;
    font-size: 13px;
    letter-spacing: 0;
    box-shadow: 0 3px 0 var(--primary-dark);
  }
  .brand-sub {
    color: var(--text-weak);
    font-weight: 400;
    margin-left: 4px;
    font-size: 13px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #chapter-indicator {
    font-size: 12px;
    font-weight: 800;
    color: var(--text-sub);
    padding: 7px 14px;
    background: var(--surface-2);
    border-radius: 999px;
    border: 2px solid var(--border);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  #timer-display {
    display: none;
    align-items: center;
    gap: 4px;
    font-size: 14px;
    font-weight: 900;
    color: var(--primary-darker);
    min-width: 64px;
    text-align: right;
    font-variant-numeric: tabular-nums;
    padding: 7px 14px;
    background: var(--primary-soft);
    border-radius: 999px;
    border: 2px solid var(--primary-dark);
  }
  #timer-display.active { display: inline-flex; }
  #timer-display.warning { color: var(--warning); background: var(--warning-bg); border-color: var(--warning-border); }
  #timer-display.danger { color: var(--danger); background: var(--danger-bg); border-color: var(--danger-border); animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: 0.6; } }

  /* ===== メイン ===== */
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: var(--space-5) var(--space-3) 96px;
    animation: appear 0.4s var(--ease);
  }
  @keyframes appear {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== ページタイトル ===== */
  .page-title { margin-bottom: 36px; }
  .page-title h1 {
    margin: 0 0 8px;
    font-family: var(--font-heading);
    font-size: 36px;
    font-weight: 900;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1.15;
  }
  .page-title p {
    margin: 0;
    font-size: 15px;
    font-weight: 700;
    color: var(--text-sub);
    letter-spacing: 0;
  }

  /* ===== セクション ===== */
  section { margin-bottom: var(--space-4); }
  .section-label {
    font-size: 12px;
    font-weight: 900;
    color: var(--text-sub);
    letter-spacing: 0.10em;
    text-transform: uppercase;
    margin: 0 0 14px;
  }

  /* ===== カード ===== */
  .card {
    background: var(--surface);
    border-radius: var(--radius-xl);
    border: 2px solid var(--border);
    overflow: hidden;
    box-shadow: 0 2px 0 var(--border);
  }

  /* ===== 統計 ===== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius-xl);
    overflow: hidden;
    box-shadow: 0 4px 0 var(--border);
  }
  .stat {
    padding: 22px 20px;
    border-right: 1px solid var(--border);
    transition: background 0.2s var(--ease);
  }
  .stat:hover { background: var(--surface-2); }
  .stat:last-child { border-right: none; }
  .stat .label {
    font-size: 12px;
    color: var(--text-sub);
    font-weight: 500;
    letter-spacing: -0.005em;
    margin-bottom: 10px;
  }
  .stat .value {
    font-family: var(--font-heading);
    font-size: 30px;
    font-weight: 900;
    color: var(--text);
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
    line-height: 1.05;
  }
  .stat .value.accent { color: var(--primary); }
  .stat:nth-child(2) .value { color: var(--blue); }
  .stat:nth-child(3) .value { color: var(--yellow-dark); }
  .stat:nth-child(4) .value { color: var(--pink); }
  .stat .unit {
    font-size: 14px;
    color: var(--text-sub);
    font-weight: 600;
    margin-left: 2px;
  }

  /* ===== 問題数選択 ===== */
  .count-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .count-btn {
    cursor: pointer;
    padding: 22px 18px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius-xl);
    text-align: center;
    transition: transform 0.08s var(--ease);
    font-family: inherit;
    color: var(--text);
    box-shadow: 0 4px 0 var(--border);
    position: relative;
    text-transform: none;
    letter-spacing: 0;
  }
  .count-btn:hover { filter: brightness(1.02); }
  .count-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--border); }

  .count-btn[data-count="5"] { color: var(--primary); border-color: var(--primary-dark); box-shadow: 0 4px 0 var(--primary-dark); }
  .count-btn[data-count="5"]:active { box-shadow: 0 2px 0 var(--primary-dark); }
  .count-btn[data-count="10"] { color: var(--blue); border-color: var(--blue-dark); box-shadow: 0 4px 0 var(--blue-dark); }
  .count-btn[data-count="10"]:active { box-shadow: 0 2px 0 var(--blue-dark); }
  .count-btn[data-count="20"] { color: var(--orange); border-color: var(--orange-dark); box-shadow: 0 4px 0 var(--orange-dark); }
  .count-btn[data-count="20"]:active { box-shadow: 0 2px 0 var(--orange-dark); }

  .count-btn .count-num {
    font-family: var(--font-heading);
    font-size: 44px;
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1;
    display: inline-block;
    font-variant-numeric: tabular-nums;
  }
  .count-btn .count-unit {
    font-size: 16px;
    font-weight: 900;
    margin-left: 2px;
  }
  .count-btn .count-desc {
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-sub);
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* ===== 章ピル（Duolingo風・章ごとカラー） ===== */
  .pill-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .pill {
    padding: 10px 16px;
    border: 2px solid var(--border);
    background: var(--surface);
    border-radius: 999px;
    font-size: 13px;
    font-weight: 800;
    color: var(--text-sub);
    cursor: pointer;
    transition: transform 0.08s var(--ease);
    font-family: inherit;
    letter-spacing: 0.02em;
    box-shadow: 0 3px 0 var(--border);
    text-transform: uppercase;
  }
  .pill:hover { filter: brightness(1.03); }
  .pill:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--border); }

  .pill[data-chapter="all"].active { background: var(--primary); border-color: var(--primary-dark); color: white; box-shadow: 0 3px 0 var(--primary-dark); }
  .pill[data-chapter="1"].active { background: var(--primary); border-color: var(--primary-dark); color: white; box-shadow: 0 3px 0 var(--primary-dark); }
  .pill[data-chapter="2"].active { background: var(--purple); border-color: var(--purple-dark); color: white; box-shadow: 0 3px 0 var(--purple-dark); }
  .pill[data-chapter="3"].active { background: var(--orange); border-color: var(--orange-dark); color: white; box-shadow: 0 3px 0 var(--orange-dark); }
  .pill[data-chapter="4"].active { background: var(--pink); border-color: var(--pink-dark); color: white; box-shadow: 0 3px 0 var(--pink-dark); }
  .pill[data-chapter="5"].active { background: var(--blue); border-color: var(--blue-dark); color: white; box-shadow: 0 3px 0 var(--blue-dark); }
  .pill[data-chapter="6"].active { background: var(--yellow); border-color: var(--yellow-dark); color: var(--text); box-shadow: 0 3px 0 var(--yellow-dark); }
  .pill[data-chapter="7"].active { background: var(--purple); border-color: var(--purple-dark); color: white; box-shadow: 0 3px 0 var(--purple-dark); }

  /* ===== ボタン（Duolingo風ソリッド影） ===== */
  button {
    border: 2px solid var(--primary-dark);
    padding: 12px 20px;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.08s var(--ease), box-shadow 0.08s var(--ease);
    background: var(--primary);
    color: white;
    font-family: inherit;
    letter-spacing: 0.02em;
    line-height: 1.4;
    box-shadow: 0 4px 0 var(--primary-dark);
    text-transform: uppercase;
  }
  button:hover:not(:disabled) {
    filter: brightness(1.05);
  }
  button:active:not(:disabled) {
    transform: translateY(2px);
    box-shadow: 0 2px 0 var(--primary-dark);
  }
  button:disabled { opacity: 0.45; cursor: not-allowed; }
  button.secondary {
    background: var(--surface);
    color: var(--text-sub);
    border: 2px solid var(--border);
    box-shadow: 0 4px 0 var(--border);
  }
  button.secondary:hover:not(:disabled) {
    background: var(--surface-2);
  }
  button.secondary:active:not(:disabled) {
    box-shadow: 0 2px 0 var(--border);
  }
  button.ghost {
    background: transparent;
    color: var(--text-sub);
    border: 2px solid transparent;
    padding: 10px 14px;
    box-shadow: none;
    text-transform: none;
    letter-spacing: 0;
  }
  button.ghost:hover:not(:disabled) {
    background: var(--surface-2);
    color: var(--text);
    filter: none;
  }
  button.ghost:active:not(:disabled) {
    transform: none;
    box-shadow: none;
  }
  button.large {
    padding: 16px 28px;
    font-size: 15px;
  }
  .btn-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* ===== 問題画面 ===== */
  .question-card {
    padding: 36px;
    box-shadow: var(--shadow-sm);
  }
  @media (max-width: 540px) { .question-card { padding: 24px; } }

  .question-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }
  .q-number {
    font-size: 11px;
    color: var(--text-sub);
    font-weight: 700;
    letter-spacing: 0.10em;
    font-variant-numeric: tabular-nums;
    text-transform: uppercase;
  }
  .progress-bar {
    height: 14px;
    background: var(--surface-2);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 32px;
    border: 2px solid var(--border);
  }
  .progress-fill {
    height: 100%;
    background: var(--primary);
    transition: width 0.5s var(--ease);
    border-radius: 999px;
    position: relative;
    box-shadow: inset 0 -4px 0 rgba(0,0,0,0.12), inset 0 4px 0 rgba(255,255,255,0.25);
  }
  .question-text {
    font-size: 15px;
    line-height: 1.85;
    margin-bottom: 28px;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text);
    letter-spacing: -0.005em;
  }
  .question-text p { margin: 0 0 12px; }
  pre.code-block {
    font-family: var(--font-mono);
    font-size: 13px;
    background: #0F172A;
    color: #E2E8F0;
    padding: 18px 20px;
    border-radius: var(--radius-lg);
    overflow-x: auto;
    margin: 16px 0;
    line-height: 1.7;
    letter-spacing: 0;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
  }

  /* ===== 選択肢 ===== */
  .choices {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 8px;
  }
  .choice {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 18px;
    border: 2px solid var(--border);
    border-radius: var(--radius-lg);
    cursor: pointer;
    transition: transform 0.08s var(--ease);
    background: var(--surface);
    box-shadow: 0 3px 0 var(--border);
  }
  .choice:hover:not(.disabled) { filter: brightness(1.02); }
  .choice:active:not(.disabled) { transform: translateY(2px); box-shadow: 0 1px 0 var(--border); }
  .choice.selected {
    border-color: var(--blue-dark);
    background: var(--blue-soft);
    box-shadow: 0 3px 0 var(--blue-dark);
  }
  .choice.correct {
    border-color: var(--primary-dark);
    background: var(--success-bg);
    box-shadow: 0 3px 0 var(--primary-dark);
  }
  .choice.incorrect {
    border-color: var(--pink-dark);
    background: var(--danger-bg);
    box-shadow: 0 3px 0 var(--pink-dark);
  }
  .choice.disabled { cursor: default; }
  .choice-label {
    display: grid;
    place-items: center;
    width: 30px;
    height: 30px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    font-weight: 900;
    color: var(--text-sub);
    font-size: 13px;
    flex-shrink: 0;
    margin-top: 0;
    transition: all 0.1s var(--ease);
  }
  .choice:hover:not(.disabled) .choice-label,
  .choice.selected .choice-label {
    background: var(--blue);
    border-color: var(--blue-dark);
    color: white;
  }
  .choice.correct .choice-label {
    background: var(--primary);
    border-color: var(--primary-dark);
    color: white;
  }
  .choice.incorrect .choice-label {
    background: var(--pink);
    border-color: var(--pink-dark);
    color: white;
  }
  .choice-text {
    flex: 1;
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 14px;
    color: var(--text);
    letter-spacing: -0.005em;
    line-height: 1.65;
    padding-top: 2px;
  }

  /* ===== 解説 ===== */
  .explanation {
    margin-top: 22px;
    padding: 22px;
    background: var(--surface-2);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    animation: fadeIn 0.3s var(--ease);
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .explanation.correct {
    background: var(--success-bg);
    border-color: var(--success-border);
  }
  .explanation.incorrect {
    background: var(--danger-bg);
    border-color: var(--danger-border);
  }
  .result-judge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 16px;
    letter-spacing: -0.005em;
  }
  .result-judge .badge-icon {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    color: white;
    font-size: 13px;
    font-weight: 700;
    line-height: 1;
  }
  .result-judge.correct { color: var(--success); }
  .result-judge.correct .badge-icon { background: var(--success); }
  .result-judge.incorrect { color: var(--danger); }
  .result-judge.incorrect .badge-icon { background: var(--danger); }
  .exp-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-sub);
    letter-spacing: 0.10em;
    text-transform: uppercase;
    margin: 18px 0 8px;
  }
  .exp-label:first-of-type { margin-top: 0; }
  .exp-text {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
    letter-spacing: -0.005em;
  }
  .detail-toggle {
    margin-top: 16px;
    font-size: 13px;
    color: var(--primary);
    cursor: pointer;
    user-select: none;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 0;
    transition: color 0.15s;
  }
  .detail-toggle:hover { color: var(--primary-dark); }
  .detail-content {
    margin-top: 10px;
    padding: 16px 18px;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    display: none;
    font-size: 13px;
    color: var(--text-2);
    line-height: 1.8;
    letter-spacing: -0.003em;
  }
  .detail-content.show {
    display: block;
    animation: fadeIn 0.2s var(--ease);
  }

  /* ===== 星ボタン ===== */
  .star-btn {
    background: transparent;
    border: none;
    padding: 6px;
    cursor: pointer;
    color: var(--text-weak);
    transition: all 0.15s var(--ease);
    line-height: 0;
    box-shadow: none;
    border-radius: var(--radius);
  }
  .star-btn:hover {
    color: var(--accent);
    background: var(--accent-soft);
    box-shadow: none;
    transform: scale(1.08);
  }
  .star-btn.active { color: var(--accent); }
  .star-btn.active:hover { background: var(--accent-soft); }
  .star-btn svg { width: 20px; height: 20px; }

  /* ===== 結果画面 ===== */
  .score-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius-xl);
    padding: 44px 32px;
    text-align: center;
    margin-bottom: 28px;
    box-shadow: 0 4px 0 var(--border);
    position: relative;
    overflow: hidden;
  }
  .score-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at top, var(--primary-softer) 0%, transparent 60%);
    pointer-events: none;
  }
  .score-card.high::before { background: radial-gradient(circle at top, var(--success-bg) 0%, transparent 60%); }
  .score-card.mid::before { background: radial-gradient(circle at top, var(--warning-bg) 0%, transparent 60%); }

<body>
<header>
  <div class="brand">
    <div class="brand-mark">JS</div>
    <span>Java Silver<span class="brand-sub">Practice</span></span>
  </div>
  <div class="header-right">
    <span id="chapter-indicator">ホーム</span>
    <span id="timer-display"></span>
  </div>
</header>

<main id="app"></main>

<script src="questions.js"></script>
<script src="lessons.js"></script>
<script>
(() => {
  'use strict';

  const CHAPTER_NAMES = {
    1: '第1章 Javaの基本',
    2: '第2章 データ型と変数',
    3: '第3章 制御構造',
    4: '第4章 配列・文字列・コレクション',
    5: '第5章 クラスとメソッド',
    6: '第6章 継承・ポリモーフィズム・例外・ラムダ',
    7: '第7章 Java SE 17 新機能'
  };
  const CHAPTER_SHORT = {
    1: '基本', 2: 'データ型', 3: '制御構造', 4: '配列・文字列',
    5: 'クラス', 6: '継承・例外', 7: 'SE17新機能'
  };

  const TIMER_SECONDS = 90;
  const STORAGE_KEY = 'java-silver-state-v1';

  const state = loadState();
  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (_) {}
    return {
      starred: [], lastIncorrect: [],
      totalAnswered: 0, totalCorrect: 0,
      timerEnabled: true, selectedChapter: 'all'
    };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let session = null;
  let timerId = null;

  const app = document.getElementById('app');
  const chapterIndicator = document.getElementById('chapter-indicator');
  const timerDisplay = document.getElementById('timer-display');

  function setChapterIndicator(text) {
    chapterIndicator.textContent = text || 'ホーム';
  }
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function formatQuestion(text) {
    const lines = text.split('\n');
    const buf = [];
    let codeBuf = [];
    const flushCode = () => {
      if (codeBuf.length) {
        buf.push(`<pre class="code-block">${escapeHtml(codeBuf.join('\n'))}</pre>`);
        codeBuf = [];
      }
    };
    for (const line of lines) {
      const isCodeLine = /[{}();]|^\s{2,}|\bpublic\b|\bprivate\b|\bclass\b|\bstatic\b|\bvoid\b|\bint\b|System\.out|\bfor\b|\bwhile\b|\bif\b|\belse\b|\breturn\b|\bnew\b|\btry\b|\bcatch\b|\bfinally\b|\bthrow\b/.test(line);
      if (isCodeLine) codeBuf.push(line);
      else {
        flushCode();
        if (line.trim()) buf.push(`<p>${escapeHtml(line)}</p>`);
      }
    }
    flushCode();
    return buf.join('');
  }
  function render(html) {
    app.innerHTML = html;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  function stopTimer() {
    if (timerId) { clearInterval(timerId); timerId = null; }
    timerDisplay.classList.remove('active', 'warning', 'danger');
  }
  function startTimer(onTimeout) {
    stopTimer();
    if (!state.timerEnabled) return;
    let remaining = TIMER_SECONDS;
    timerDisplay.classList.add('active');
    timerDisplay.textContent = `${remaining}s`;
    timerId = setInterval(() => {
      remaining--;
      timerDisplay.textContent = `${remaining}s`;
      timerDisplay.classList.remove('warning', 'danger');
      if (remaining <= 10) timerDisplay.classList.add('danger');
      else if (remaining <= 30) timerDisplay.classList.add('warning');
      if (remaining <= 0) { stopTimer(); onTimeout(); }
    }, 1000);
  }

  const ICON_STAR = `<svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M12 2l2.9 6.6 7.1.7-5.4 4.9 1.6 7-6.2-3.7-6.2 3.7 1.6-7L2 9.3l7.1-.7L12 2z"/></svg>`;
  const ICON_STAR_OUTLINE = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><path d="M12 2l2.9 6.6 7.1.7-5.4 4.9 1.6 7-6.2-3.7-6.2 3.7 1.6-7L2 9.3l7.1-.7L12 2z"/></svg>`;

  function renderHome() {
    stopTimer();
    setChapterIndicator('ホーム');
    const accuracy = state.totalAnswered > 0
      ? Math.round((state.totalCorrect / state.totalAnswered) * 100) : 0;
    const starredCount = state.starred.length;
    const lastIncorrectCount = state.lastIncorrect.length;

    const chapterPills = [
      { v: 'all', label: '全章' },
      ...Object.keys(CHAPTER_SHORT).map(k => ({ v: k, label: `${k}章 · ${CHAPTER_SHORT[k]}` }))
    ].map(opt => `
      <button class="pill ${state.selectedChapter === opt.v ? 'active' : ''}" data-chapter="${opt.v}">${opt.label}</button>
    `).join('');

    render(`
      <div class="page-title">
        <h1>Java Silverを学ぶ</h1>
        <p>Java Silver SE 17（1Z0-825）対策 · 教科書40トピック + 練習問題175問</p>
      </div>

      <section>
        <div class="section-label">学習モード</div>
        <div class="mode-grid">
          <button class="mode-card learn" id="btn-learn">
            <div class="mode-icon">📘</div>
            <div class="mode-title">教科書で学ぶ</div>
            <div class="mode-desc">基礎知識を章ごとに学ぶ · 全40トピック</div>
          </button>
          <button class="mode-card quiz" id="btn-quiz-mode">
            <div class="mode-icon">✏️</div>
            <div class="mode-title">問題を解く</div>
            <div class="mode-desc">下のメニューから問題数を選択</div>
          </button>
        </div>
      </section>

      <section>
        <div class="stats-grid">
          <div class="stat">
            <div class="label">累計正答率</div>
            <div class="value accent">${accuracy}<span class="unit">%</span></div>
          </div>
          <div class="stat">
            <div class="label">累計回答</div>
            <div class="value">${state.totalAnswered}</div>
          </div>
          <div class="stat">
            <div class="label">苦手マーク</div>
            <div class="value">${starredCount}</div>
          </div>
          <div class="stat">
            <div class="label">直近の誤答</div>
            <div class="value">${lastIncorrectCount}</div>
          </div>
        </div>
      </section>

      <section>
        <div class="section-label">出題範囲</div>
        <div class="pill-group" id="chapter-pills">${chapterPills}</div>
      </section>

      <section>
        <div class="section-label">問題数を選択</div>
        <div class="count-grid">
          <button class="count-btn" data-count="5">
            <span class="count-num">5</span><span class="count-unit">問</span>
            <div class="count-desc">サクッと確認</div>
          </button>
          <button class="count-btn" data-count="10">
            <span class="count-num">10</span><span class="count-unit">問</span>
            <div class="count-desc">標準</div>
          </button>
          <button class="count-btn" data-count="20">
            <span class="count-num">20</span><span class="count-unit">問</span>
            <div class="count-desc">じっくり</div>
          </button>
        </div>
      </section>

      <section>
        <div class="section-label">復習モード</div>
        <div class="btn-group">
          <button class="secondary" id="btn-review" ${lastIncorrectCount === 0 ? 'disabled' : ''}>直近のミスを復習 · ${lastIncorrectCount}問</button>
          <button class="secondary" id="btn-starred" ${starredCount === 0 ? 'disabled' : ''}>苦手マークのみ · ${starredCount}問</button>
        </div>
      </section>

      <section>
        <div class="section-label">設定</div>
        <div class="card">
          <div class="list-item">
            <div>
              <div class="list-label">制限時間</div>
              <div class="list-hint">1問あたり90秒（本試験の約1.7分ペース）</div>
            </div>
            <div class="switch ${state.timerEnabled ? 'on' : ''}" id="switch-timer"></div>
          </div>
          <div class="list-item">
            <div>
              <div class="list-label">進捗データ</div>
              <div class="list-hint">累計・苦手マーク・誤答履歴をリセット</div>
            </div>
            <button class="ghost" id="btn-reset">リセット</button>
          </div>
        </div>
      </section>
    `);

    document.getElementById('btn-learn').addEventListener('click', renderLearnHome);
    document.getElementById('btn-quiz-mode').addEventListener('click', () => {
      const target = document.querySelector('.count-grid');
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
    app.querySelectorAll('#chapter-pills .pill').forEach(btn => {
      btn.addEventListener('click', () => {
        state.selectedChapter = btn.dataset.chapter;
        saveState();
        renderHome();
      });
    });
    app.querySelectorAll('[data-count]').forEach(btn => {
      btn.addEventListener('click', () => {
        const count = parseInt(btn.dataset.count, 10);
        startQuiz({ count, chapter: state.selectedChapter, mode: 'normal' });
      });
    });
    document.getElementById('btn-review').addEventListener('click', () => startQuiz({ mode: 'review' }));
    document.getElementById('btn-starred').addEventListener('click', () => startQuiz({ mode: 'starred' }));
    document.getElementById('switch-timer').addEventListener('click', () => {
      state.timerEnabled = !state.timerEnabled;
      saveState();
      renderHome();
    });
    document.getElementById('btn-reset').addEventListener('click', () => {
      if (confirm('進捗データ（累計・苦手マーク・誤答履歴）をリセットしますか？')) {
        localStorage.removeItem(STORAGE_KEY);
        Object.assign(state, {
          starred: [], lastIncorrect: [],
          totalAnswered: 0, totalCorrect: 0, timerEnabled: true,
          selectedChapter: 'all'
        });
        renderHome();
      }
    });
  }

  function renderLessonBody(text) {
    return escapeHtml(text).replace(/\n/g, '<br>');
  }

  function renderLearnHome() {
    stopTimer();
    setChapterIndicator('教科書');
    const chapterCards = Object.keys(CHAPTER_NAMES).map(ch => {
      const topics = LESSONS.filter(l => l.chapter === parseInt(ch, 10));
      return `
        <button class="chapter-card" data-ch="${ch}">
          <div class="chip">${ch}</div>
          <div class="body">
            <div class="title">${escapeHtml(CHAPTER_NAMES[ch])}</div>
            <div class="meta">${topics.length} トピック</div>
          </div>
          <div class="arrow">›</div>
        </button>
      `;
    }).join('');

    render(`
      <div class="breadcrumb">
        <a id="crumb-home">ホーム</a>
        <span class="sep">›</span>
        <span>教科書</span>
      </div>
      <div class="page-title">
        <h1>教科書で学ぶ</h1>
        <p>章を選んで基礎から学ぶ · 問題を解く前の土台づくりに</p>
      </div>
      <section>
        <div class="section-label">章を選択</div>
        <div class="chapter-card-list">${chapterCards}</div>
      </section>
    `);

    document.getElementById('crumb-home').addEventListener('click', renderHome);
    app.querySelectorAll('.chapter-card').forEach(btn => {
      btn.addEventListener('click', () => {
        renderChapterLessons(parseInt(btn.dataset.ch, 10));
      });
    });
  }

  function renderChapterLessons(chapter) {
    stopTimer();
    setChapterIndicator(CHAPTER_NAMES[chapter]);
    const topics = LESSONS.filter(l => l.chapter === chapter);
    const topicHtml = topics.map((t, i) => `
      <button class="topic-card" data-id="${t.id}">
        <div class="num">${i + 1}</div>
        <div class="body">
          <div class="title">${escapeHtml(t.title)}</div>
          <div class="summary">${escapeHtml(t.summary)}</div>
        </div>
      </button>
    `).join('');

    render(`
      <div class="breadcrumb">
        <a id="crumb-home">ホーム</a>
        <span class="sep">›</span>
        <a id="crumb-learn">教科書</a>
        <span class="sep">›</span>
        <span>${escapeHtml(CHAPTER_SHORT[chapter])}</span>
      </div>
      <div class="page-title">
        <h1>${escapeHtml(CHAPTER_NAMES[chapter])}</h1>
        <p>${topics.length} トピックを順番に学んでいきましょう</p>
      </div>
      <section>
        <div class="section-label">トピック一覧</div>
        <div class="topic-list">${topicHtml}</div>
      </section>
      <div class="btn-group" style="margin-top:28px;">
        <button class="secondary" id="btn-back-learn">← 章一覧へ</button>
        <button id="btn-quiz-ch">この章の問題を解く →</button>
      </div>
    `);

    document.getElementById('crumb-home').addEventListener('click', renderHome);
    document.getElementById('crumb-learn').addEventListener('click', renderLearnHome);
    document.getElementById('btn-back-learn').addEventListener('click', renderLearnHome);
    document.getElementById('btn-quiz-ch').addEventListener('click', () => {
      startQuiz({ count: 10, chapter: String(chapter), mode: 'normal' });
    });
    app.querySelectorAll('.topic-card').forEach(btn => {
      btn.addEventListener('click', () => {
        renderLesson(btn.dataset.id);
      });
    });
  }

  function renderLesson(topicId) {
    stopTimer();
    const topic = LESSONS.find(l => l.id === topicId);
    if (!topic) { renderLearnHome(); return; }
    setChapterIndicator(CHAPTER_NAMES[topic.chapter]);

    const idx = LESSONS.filter(l => l.chapter === topic.chapter).findIndex(l => l.id === topicId);
    const chapterTopics = LESSONS.filter(l => l.chapter === topic.chapter);
    const prev = idx > 0 ? chapterTopics[idx - 1] : null;
    const next = idx < chapterTopics.length - 1 ? chapterTopics[idx + 1] : null;

    const sectionsHtml = topic.sections.map(s => `
      <div class="lesson-section">
        <h2>${escapeHtml(s.heading)}</h2>
        <p>${renderLessonBody(s.body)}</p>
        ${s.code ? `<pre class="code-block">${escapeHtml(s.code)}</pre>` : ''}
      </div>
    `).join('');

    const pointsHtml = topic.points && topic.points.length ? `
      <div class="points-box">
        <h3>🎯 要点</h3>
        <ul>${topic.points.map(p => `<li>${escapeHtml(p)}</li>`).join('')}</ul>
      </div>
    ` : '';

    const pitfallsHtml = topic.pitfalls && topic.pitfalls.length ? `
      <div class="pitfalls-box">
        <h3>⚠️ ひっかかりやすいポイント</h3>
        <ul>${topic.pitfalls.map(p => `<li>${escapeHtml(p)}</li>`).join('')}</ul>
      </div>
    ` : '';

    render(`
      <div class="breadcrumb">
        <a id="crumb-home">ホーム</a>
        <span class="sep">›</span>
        <a id="crumb-learn">教科書</a>
        <span class="sep">›</span>
        <a id="crumb-ch">${escapeHtml(CHAPTER_SHORT[topic.chapter])}</a>
        <span class="sep">›</span>
        <span>${idx + 1} / ${chapterTopics.length}</span>
      </div>

      <div class="lesson-header">
        <h1>${escapeHtml(topic.title)}</h1>
      </div>
      <div class="lesson-summary">${escapeHtml(topic.summary)}</div>

      ${sectionsHtml}
      ${pointsHtml}
      ${pitfallsHtml}

      <div class="lesson-nav">
        <div class="group">
          ${prev ? `<button class="secondary" id="btn-prev">← 前</button>` : '<span></span>'}
        </div>
        <div class="group">
          <button class="secondary" id="btn-ch-list">章の目次へ</button>
          ${next
            ? `<button id="btn-next-lesson">次のトピック →</button>`
            : `<button id="btn-to-quiz">この章の問題を解く →</button>`}
        </div>
      </div>
    `);

    document.getElementById('crumb-home').addEventListener('click', renderHome);
    document.getElementById('crumb-learn').addEventListener('click', renderLearnHome);
    document.getElementById('crumb-ch').addEventListener('click', () => renderChapterLessons(topic.chapter));
    document.getElementById('btn-ch-list').addEventListener('click', () => renderChapterLessons(topic.chapter));
    if (prev) {
      document.getElementById('btn-prev').addEventListener('click', () => renderLesson(prev.id));
    }
    if (next) {
      document.getElementById('btn-next-lesson').addEventListener('click', () => renderLesson(next.id));
    } else {
      document.getElementById('btn-to-quiz').addEventListener('click', () => {
        startQuiz({ count: 10, chapter: String(topic.chapter), mode: 'normal' });
      });
    }
  }

  function startQuiz({ count, chapter, mode }) {
    let pool;
    if (mode === 'review') pool = QUESTIONS.filter(q => state.lastIncorrect.includes(q.id));
    else if (mode === 'starred') pool = QUESTIONS.filter(q => state.starred.includes(q.id));
    else {
      if (chapter === 'all') pool = QUESTIONS.slice();
      else {
        const c = parseInt(chapter, 10);
        pool = QUESTIONS.filter(q => q.chapter === c);
      }
    }
    if (pool.length === 0) { alert('出題可能な問題がありません。'); return; }

    const picked = shuffle(pool).slice(0, count || pool.length);
    const questions = picked.map(q => {
      const idxs = shuffle(q.choices.map((_, i) => i));
      const shuffledChoices = idxs.map(i => q.choices[i]);
      const newAnswer = idxs.indexOf(q.answer);
      return { ...q, choices: shuffledChoices, answer: newAnswer };
    });

    session = { questions, index: 0, answers: [], newlyIncorrect: [] };
    renderQuestion();
  }

  function renderQuestion() {
    const q = session.questions[session.index];
    const isStarred = state.starred.includes(q.id);
    setChapterIndicator(CHAPTER_NAMES[q.chapter]);

    render(`
      <div class="card question-card">
        <div class="question-meta">
          <span class="q-number">Q ${String(session.index + 1).padStart(2, '0')} / ${String(session.questions.length).padStart(2, '0')}</span>
          <button class="star-btn ${isStarred ? 'active' : ''}" id="btn-star" title="苦手マーク">
            ${isStarred ? ICON_STAR : ICON_STAR_OUTLINE}
          </button>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${((session.index) / session.questions.length) * 100}%;"></div>
        </div>
        <div class="question-text">${formatQuestion(q.question)}</div>
        <div class="choices" id="choices">
          ${q.choices.map((c, i) => `
            <div class="choice" data-index="${i}">
              <span class="choice-label">${String.fromCharCode(65 + i)}</span>
              <span class="choice-text">${escapeHtml(c)}</span>
            </div>
          `).join('')}
        </div>
        <div id="explanation-area"></div>
        <div class="btn-group" id="bottom-btn" style="justify-content:flex-end; margin-top:20px;">
          <button class="ghost" id="btn-quit">中断</button>
        </div>
      </div>
    `);

    document.getElementById('btn-star').addEventListener('click', () => {
      toggleStar(q.id);
      renderQuestion();
    });
    document.getElementById('btn-quit').addEventListener('click', () => {
      if (confirm('セッションを中断してホームへ戻りますか？（ここまでの回答は記録されません）')) {
        session = null;
        renderHome();
      }
    });
    document.querySelectorAll('#choices .choice').forEach(el => {
      el.addEventListener('click', () => selectAnswer(parseInt(el.dataset.index, 10)));
    });
    startTimer(() => selectAnswer(-1));
  }

  function toggleStar(id) {
    const i = state.starred.indexOf(id);
    if (i >= 0) state.starred.splice(i, 1);
    else state.starred.push(id);
    saveState();
  }

  function selectAnswer(chosen) {
    stopTimer();
    const q = session.questions[session.index];
    const correct = chosen === q.answer;
    session.answers.push({ id: q.id, chapter: q.chapter, chosen, correct });
    if (!correct) session.newlyIncorrect.push(q.id);

    state.totalAnswered++;
    if (correct) state.totalCorrect++;
    saveState();

    document.querySelectorAll('#choices .choice').forEach(el => {
      el.classList.add('disabled');
      el.replaceWith(el.cloneNode(true));
    });
    const choiceEls = document.querySelectorAll('#choices .choice');
    choiceEls.forEach(el => {
      const i = parseInt(el.dataset.index, 10);
      if (i === q.answer) el.classList.add('correct');
      if (i === chosen && !correct) el.classList.add('incorrect');
    });

    const judgeLabel = chosen === -1 ? '時間切れ' : correct ? '正解' : '不正解';
    const judgeIcon = correct ? '✓' : '✕';
    const judgeText = `
      <div class="result-judge ${correct ? 'correct' : 'incorrect'}">
        <span class="badge-icon">${judgeIcon}</span>
        <span>${judgeLabel}</span>
      </div>
    `;

    const expArea = document.getElementById('explanation-area');
    expArea.innerHTML = `
      <div class="explanation ${correct ? 'correct' : 'incorrect'}">
        ${judgeText}
        <div class="exp-label">ざっくり解説</div>
        <div class="exp-text">${escapeHtml(q.brief)}</div>
        <div class="detail-toggle" id="detail-toggle">▾ 詳しく解説を見る</div>
        <div class="detail-content" id="detail-content">${escapeHtml(q.detail)}</div>
      </div>
    `;
    document.getElementById('detail-toggle').addEventListener('click', () => {
      const dc = document.getElementById('detail-content');
      const dt = document.getElementById('detail-toggle');
      dc.classList.toggle('show');
      dt.textContent = dc.classList.contains('show') ? '▴ 閉じる' : '▾ 詳しく解説を見る';
    });

    const bottomBtn = document.getElementById('bottom-btn');
    const isLast = session.index === session.questions.length - 1;
    bottomBtn.innerHTML = `
      <button class="ghost" id="btn-quit-2">中断</button>
      <button id="btn-next" class="large">${isLast ? '結果を見る →' : '次の問題 →'}</button>
    `;
    document.getElementById('btn-quit-2').addEventListener('click', () => {
      if (confirm('セッションを中断してホームへ戻りますか？')) {
        session = null;
        renderHome();
      }
    });
    document.getElementById('btn-next').addEventListener('click', () => {
      if (isLast) renderResult();
      else { session.index++; renderQuestion(); }
    });
  }

  function renderResult() {
    stopTimer();
    setChapterIndicator('結果');
    state.lastIncorrect = session.newlyIncorrect.slice();
    saveState();

    const total = session.answers.length;
    const correct = session.answers.filter(a => a.correct).length;
    const rate = Math.round((correct / total) * 100);

    const byChapter = {};
    session.answers.forEach(a => {
      if (!byChapter[a.chapter]) byChapter[a.chapter] = { total: 0, correct: 0 };
      byChapter[a.chapter].total++;
      if (a.correct) byChapter[a.chapter].correct++;
    });

    const chapterHtml = Object.keys(byChapter)
      .sort((a, b) => parseInt(a) - parseInt(b))
      .map(c => {
        const { total: t, correct: cc } = byChapter[c];
        const r = Math.round((cc / t) * 100);
        const cls = r >= 80 ? 'high' : r >= 50 ? 'mid' : 'low';
        return `
          <div class="chapter-row">
            <span class="chapter-name">${CHAPTER_NAMES[c]}</span>
            <div class="chapter-right">
              <div class="chapter-bar"><div class="chapter-bar-fill ${cls}" style="width:${r}%;"></div></div>
              <span class="rate ${cls}">${cc}/${t} · ${r}%</span>
            </div>
          </div>
        `;
      }).join('');

    const heroCls = rate >= 80 ? 'high' : rate >= 50 ? 'mid' : 'low';
    const comment = rate >= 80
      ? 'すばらしい正答率です。本番でもこの調子で。'
      : rate >= 50
        ? '間違えた問題を復習モードで固めましょう。'
        : '基礎から復習して再チャレンジしましょう。';

    // 円形プログレス用
    const RADIUS = 82;
    const CIRC = 2 * Math.PI * RADIUS;
    const offset = CIRC * (1 - rate / 100);

    render(`
      <div class="page-title">
        <h1>結果</h1>
        <p>${comment}</p>
      </div>

      <div class="score-card ${heroCls}">
        <div class="score-label">正答率</div>
        <div class="score-ring-wrap">
          <svg class="score-ring" viewBox="0 0 180 180">
            <circle class="score-ring-bg" cx="90" cy="90" r="${RADIUS}"></circle>
            <circle class="score-ring-fg" cx="90" cy="90" r="${RADIUS}"
                    stroke-dasharray="${CIRC}"
                    stroke-dashoffset="${offset}"></circle>
          </svg>
          <div class="score-ring-text">
            <div class="score-value">${rate}<span class="unit">%</span></div>
          </div>
        </div>
        <div class="score-detail">${correct} / ${total} 問正解</div>
      </div>

      <section>
        <div class="section-label">章別の正答率</div>
        <div class="card">${chapterHtml}</div>
      </section>

      <div class="btn-group" style="margin-top:28px;">
        <button id="btn-home" class="large">ホームへ戻る</button>
        ${session.newlyIncorrect.length > 0
          ? '<button class="secondary large" id="btn-retry-wrong">間違えた問題だけ再挑戦</button>'
          : ''}
      </div>
    `);

    document.getElementById('btn-home').addEventListener('click', renderHome);
    const retryBtn = document.getElementById('btn-retry-wrong');
    if (retryBtn) retryBtn.addEventListener('click', () => startQuiz({ mode: 'review' }));
  }

  renderHome();
})();
</script>
</body>
</html>
